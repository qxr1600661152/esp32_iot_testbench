; espviewproj — ESP32-S3  + ESP32-C3 （）
;
; 【 S3 ： BOOT+RST】
;   -  S3 USB（COM9），C3
;   -  esp32s3_minimal →  Upload
;   -  Connecting... ： BOOT →  RST →  RST →  BOOT
;   -  [s3-min] ALIVE； extends  _upload_s3_auto
;
;  esp32s3_minimal：； esp32s3_screen_test

[platformio]
default_envs = esp32s3_epaper
description = ESP32-S3 e-paper display + ESP32-C3 remote (separate env)

; --- S3 （HID  /  BOOT+RST， default_reset）---
[env:_upload_s3_manual]
upload_protocol = esptool
upload_speed = 115200
upload_port = COM9
monitor_port = COM9
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
board_upload.wait_for_upload_port = true
board_upload.before_reset = no_reset
board_upload.after_reset = hard_reset
upload_flags =
    --connect-attempts=80
extra_scripts = pre:scripts/pre_upload_s3_manual.py
monitor_filters = esp32_exception_decoder

; --- S3 （ USB-CDC  profile）---
[env:_upload_s3_auto]
upload_protocol = esptool
upload_speed = 460800
upload_port = COM9
monitor_port = COM9
monitor_speed = 115200
board_upload.wait_for_upload_port = true
board_upload.before_reset = default_reset
board_upload.after_reset = hard_reset
upload_flags =
    --connect-attempts=25
monitor_filters = esp32_exception_decoder

[env:_upload_c3]
upload_protocol = esptool
upload_speed = 460800
upload_port = COM11
monitor_port = COM11
monitor_speed = 115200
board_upload.wait_for_upload_port = true
board_upload.before_reset = default_reset
board_upload.after_reset = hard_reset
upload_flags =
    --connect-attempts=25
monitor_filters = esp32_exception_decoder

; --- ：ESP32-S3 + 1.54" 200×200 SPI ---
[env:esp32s3_epaper]
extends = env:_upload_s3_auto
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
build_flags =
    -Os
    -DCORE_DEBUG_LEVEL=1
    -DEPD_TARGET_S3=1
    -DCONFIG_BT_NIMBLE_NVS_PERSIST=0
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=16384
    -DCONFIG_BT_NIMBLE_SM_LEGACY=0
    -DCONFIG_BT_NIMBLE_SM_SC=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
board_build.partitions = partitions_s3.csv
board_build.filesystem = littlefs
;  partitions_s3.csv  app0 @ 0x20000 （pio upload  0x10000 ）
board_upload.offset_address = 0x20000
build_src_filter =
    +<*>
    -<remote/>
    -<s3_minimal/>
    -<s3_interact/>
lib_deps =
    zinggjm/GxEPD2 @ ^1.6.5
    adafruit/Adafruit GFX Library @ ^1.12.1
    bblanchon/ArduinoJson @ ^7.0.0
    h2zero/NimBLE-Arduino@^1.4.2
debug_tool = cmsis-dap

; ：PING/INFO/GPIO21，
[env:esp32s3_interact]
extends = env:esp32s3_epaper
build_src_filter =
    -<*>
    +<s3_interact/>
lib_deps =

; ：， [s3-min] ALIVE / tick
[env:esp32s3_minimal]
extends = env:esp32s3_epaper
build_src_filter =
    -<*>
    +<s3_minimal/>
lib_deps =

; ： 5  demo （ BLE）
[env:esp32s3_screen_test]
extends = env:esp32s3_epaper
build_flags =
    ${env:esp32s3_epaper.build_flags}
    -DEPD_SCREEN_TEST=1

; ： NimBLE， store+
[env:esp32s3_epaper_noble]
extends = env:esp32s3_epaper
build_flags =
    ${env:esp32s3_epaper.build_flags}
    -DEPD_BLE_ENABLE=0
build_src_filter =
    +<*>
    -<remote/>
    -<s3_minimal/>
    -<s3_interact/>
    -<epd_ble.cpp>
lib_deps =
    zinggjm/GxEPD2 @ ^1.6.5
    adafruit/Adafruit GFX Library @ ^1.12.1
    bblanchon/ArduinoJson @ ^7.0.0

[env:esp32s3_epaper_debug]
extends = env:esp32s3_epaper
build_type = debug
build_unflags = -Os
build_flags =
    -Og -g3
    -DCORE_DEBUG_LEVEL=3
    -DEPD_TARGET_S3=1
    -DCONFIG_BT_NIMBLE_NVS_PERSIST=0
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=16384
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; --- C3 ： S3 EN， ---
[env:esp32c3_remote]
extends = env:_upload_c3
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
build_type = release
build_src_filter =
    -<*>
    +<remote/>
build_flags =
    -Os
    -DCORE_DEBUG_LEVEL=0
board_build.f_cpu = 80000000L

; ---  /  C3 （）---
[env:esp32c3_epaper]
extends = env:_upload_c3
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
build_type = release
build_flags =
    -Os
    -DCORE_DEBUG_LEVEL=1
    -DCONFIG_BT_NIMBLE_NVS_PERSIST=0
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=16384
board_build.f_cpu = 80000000L
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
build_src_filter =
    +<*>
    -<remote/>
    -<s3_minimal/>
    -<s3_interact/>
lib_deps =
    zinggjm/GxEPD2 @ ^1.6.5
    adafruit/Adafruit GFX Library @ ^1.12.1
    bblanchon/ArduinoJson @ ^7.0.0
    h2zero/NimBLE-Arduino@^1.4.2
debug_tool = cmsis-dap

[env:esp32c3_epaper_debug]
extends = env:esp32c3_epaper
build_type = debug
build_unflags = -Os
board_build.f_cpu = 160000000L
build_flags =
    -Og -g3
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_BT_NIMBLE_NVS_PERSIST=0
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=16384

; --- （ESP8266 NodeMCU LED）---
[env:legacy_nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
build_src_filter = +<../legacy/esp8266/*>
